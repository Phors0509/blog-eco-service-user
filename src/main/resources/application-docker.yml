server:
  port: 80
spring:
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME}:${DB_PORT}/${DB_DATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    kafka:
      topic: ${ECO_ZIPKIN_TOPIC}
